name: Lint source

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    permissions:
      contents: read
    name: pre-commit
    runs-on: ubuntu-full
    steps:
      - uses: https://github.com/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: https://github.com/pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          run_install: false
      - name: Install Node.js
        uses: https://github.com/actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.13.0
          cache: "pnpm"
      - name: Setup go
        uses: https://github.com/actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ">=1.25.6"
          token: ${{ secrets.GH_PAT }}
      - name: Install uv with all available options
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          github-token: ${{ secrets.GH_PAT }}
      - name: Install dependencies
        run: pnpm install --frozen-lock
      - run: ./scripts/gen_version.sh
      - run: ./scripts/prebuild.sh
      - uses: https://github.com/j178/prek-action@0bb87d7f00b0c99306c8bcb8b8beba1eb581c037 # v1.1.1
