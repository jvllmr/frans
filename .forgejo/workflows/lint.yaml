name: Lint source

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    permissions:
      contents: read
    name: pre-commit
    runs-on: ubuntu-full
    steps:
      - uses: https://github.com/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: https://github.com/pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          run_install: false
      - name: Install Node.js
        uses: https://github.com/actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.13.0
          cache: "pnpm"
      - name: Setup go
        uses: https://github.com/actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ">=1.25.6"
          token: ${{ secrets.GH_PAT }}
      - name: Install uv with all available options
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          github-token: ${{ secrets.GH_PAT }}
      - name: Install dependencies
        run: pnpm install --frozen-lock
      - run: ./scripts/gen_version.sh
      - run: ./scripts/prebuild.sh
      - uses: https://github.com/j178/prek-action@79f765515bd648eb4d6bb1b17277b7cb22cb6468 # v2.0.0
