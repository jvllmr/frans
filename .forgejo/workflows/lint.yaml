name: Lint source

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    permissions:
      contents: read
    name: pre-commit
    runs-on: ubuntu-full
    steps:
      - uses: https://github.com/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: https://github.com/pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          run_install: false
      - name: Install Node.js
        uses: https://github.com/actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.13.0
          cache: "pnpm"
      - name: Setup go
        uses: https://github.com/actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.25.6"
          token: ${{ secrets.GH_PAT }}
      - name: Install uv with all available options
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          github-token: ${{ secrets.GH_PAT }}
      - name: Install dependencies
        run: pnpm install --frozen-lock
      - run: ./scripts/gen_version.sh
      - run: ./scripts/prebuild.sh
      - uses: https://github.com/j178/prek-action@53276d8b0d10f8b6672aa85b4588c6921d0370cc # v2.0.1
