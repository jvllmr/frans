name: Lint source

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    permissions:
      contents: read
    name: pre-commit
    runs-on: ubuntu-full
    steps:
      - uses: https://github.com/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: https://github.com/pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          run_install: false
      - name: Install Node.js
        uses: https://github.com/actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24.13.0
          cache: "pnpm"
      - name: Setup go
        uses: https://github.com/actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ">=1.25.6"
          token: ${{ secrets.GH_PAT }}
      - name: Install uv with all available options
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          github-token: ${{ secrets.GH_PAT }}
      - name: Install dependencies
        run: pnpm install --frozen-lock
      - run: ./scripts/gen_version.sh
      - run: ./scripts/prebuild.sh
      - uses: https://github.com/j178/prek-action@v1.1.1
